name: publish-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-lsp:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true
            vsce_target: linux-x64
          - runner: ubuntu-latest
            target: x86_64-pc-windows-gnu
            use_cross: true
            vsce_target: win32-x64
          - runner: macos-latest
            target: aarch64-apple-darwin
            use_cross: false
            vsce_target: darwin-arm64
    name: build-lsp-${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          targets: ${{ matrix.platform.target }}

      - name: Install cross
        if: matrix.platform.use_cross
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cross
          git: https://github.com/cross-rs/cross
          rev: 8633ec65ab914015c2444c732568b414bd3c47cf

      - name: Build lsp (cross)
        if: matrix.platform.use_cross
        run: cross build --target ${{ matrix.platform.target }} --profile release

      - name: Build lsp (cargo)
        if: matrix.platform.use_cross == false
        run: cargo build --target ${{ matrix.platform.target }} --profile release

      - name: Package lsp artifact
        run: |
          mkdir -p dist
          BIN_NAME=idl-language-server
          if [ "${{ matrix.platform.target }}" = "x86_64-pc-windows-gnu" ]; then
            BIN_NAME="idl-language-server.exe"
          fi
          tar -czf dist/idl-language-server-${{ matrix.platform.target }}.tar.gz -C target/${{ matrix.platform.target }}/release ${BIN_NAME}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build VS Code extension bundle
        run: node esbuild.js --production

      - name: Package VS Code extension
        run: |
          set -euo pipefail

          rm -rf server
          mkdir -p server

          tar -xzf "dist/idl-language-server-${{ matrix.platform.target }}.tar.gz" -C server
          if [ "${{ matrix.platform.vsce_target }}" != "win32-x64" ]; then
            chmod +x server/idl-language-server
          fi

          pnpm exec vsce package \
            --no-dependencies \
            --target "${{ matrix.platform.vsce_target }}" \
            --out "dist/vscode-idl-language-${{ matrix.platform.vsce_target }}.vsix"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: idl-language-server-${{ matrix.platform.target }}
          path: |
            dist/*.tar.gz
            dist/*.vsix

  release:
    needs:
      - build-lsp
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Generate release body
        run: |
          mkdir -p release
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            echo "Skip release body for ref ${GITHUB_REF}"
            exit 0
          fi

          sed \
            -e "s|REPOSITORY|${GITHUB_REPOSITORY}|g" \
            -e "s|RELEASE_TAG|${RELEASE_TAG}|g" \
            ./.github/release_template.md > release/body.md

      - name: Release tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*/*.tar.gz
            dist/*/*.vsix
          body_path: release/body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-vscode:
    needs:
      - build-lsp
    runs-on: ubuntu-latest
    continue-on-error: true
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: install taplo
        uses: baptiste0928/cargo-install@v3
        with:
          crate: taplo-cli

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish VS Code extension
        env:
          VS_MARKETPLACE_TOKEN: ${{ secrets.VS_MARKETPLACE_TOKEN }}
        run: |
          set -euo pipefail
          for vsix in dist/*/*.vsix; do
            pnpm exec vsce publish --packagePath "$vsix" -p "$VS_MARKETPLACE_TOKEN"
          done
