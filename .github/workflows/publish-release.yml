name: publish-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-lsp:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true
          - runner: ubuntu-latest
            target: x86_64-pc-windows-gnu
            use_cross: true
          - runner: macos-latest
            target: aarch64-apple-darwin
            use_cross: false
    name: build-lsp-${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.platform.target }}

      - name: Install cross
        if: matrix.platform.use_cross
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cross
          git: https://github.com/cross-rs/cross
          rev: 8633ec65ab914015c2444c732568b414bd3c47cf

      - name: Build lsp (cross)
        if: matrix.platform.use_cross
        run: cross build --target ${{ matrix.platform.target }} --profile release

      - name: Build lsp (cargo)
        if: matrix.platform.use_cross == false
        run: cargo build --target ${{ matrix.platform.target }} --profile release

      - name: Package lsp artifact
        run: |
          mkdir -p dist
          BIN_NAME=idl-language-server
          if [ "${{ matrix.platform.target }}" = "x86_64-pc-windows-gnu" ]; then
            BIN_NAME="idl-language-server.exe"
          fi
          tar -czf dist/idl-language-server-${{ matrix.platform.target }}.tar.gz -C target/${{ matrix.platform.target }}/release ${BIN_NAME}

      - name: Upload lsp artifact
        uses: actions/upload-artifact@v4
        with:
          name: idl-language-server-${{ matrix.platform.target }}
          path: dist/*.tar.gz

  release:
    needs:
      - build-lsp
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate release body
        run: |
          mkdir -p release
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            echo "Skip release body for ref ${GITHUB_REF}"
            exit 0
          fi

          sed \
            -e "s|REPOSITORY|${GITHUB_REPOSITORY}|g" \
            -e "s|RELEASE_TAG|${RELEASE_TAG}|g" \
            ./.github/release_template.md > release/body.md

      - name: Release tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*/*.tar.gz
          body_path: release/body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
