<!doctype html>
<html>
<head>
    <title>Scalar</title>
    <meta charset="utf-8"/>
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1"/>
</head>
<body>

<script
        id="api-reference"
        type="application/json">
    $spec
</script>
<script >
    {{ api-reference }}
</script>
<script>
    (function() {
        let lastSpec = null;
        async function checkSpec() {
            try {
                const res = await fetch('/openapi.json', { cache: 'no-store' });
                if (!res.ok) return;
                const text = await res.text();
                if (lastSpec === null) {
                    lastSpec = text;
                    return;
                }
                if (text !== lastSpec) {
                    location.reload();
                }
            } catch (_) {
                // ignore
            }
        }
        setInterval(checkSpec, 1000);
    })();
</script>
</body>
</html>
